name: Build Artifact

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build target'
        required: true
        type: choice
        options:
          - windows-amd64
          - windows-386
          - linux-amd64
          - linux-arm64
          - macos-amd64
          - macos-arm64

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ inputs.platform }}
      upload: false
