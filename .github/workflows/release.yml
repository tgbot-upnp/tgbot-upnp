name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-amd64
          - windows-386
          - linux-amd64
          - linux-386
          - linux-arm64
          - linux-arm7
          - linux-arm6
          - linux-arm5
          - windows-arm64
          - macos-amd64
          - macos-arm64
    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      upload: true
