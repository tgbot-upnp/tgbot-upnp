name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  actions: write
jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        goos: [windows, linux]
        goarch: [amd64, 386]
        include:
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: linux
            goarch: arm
            goarm: 6
          - goos: linux
            goarch: arm
            goarm: 5
          - goos: windows
            goarch: arm64
      fail-fast: false

    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6

      - name: Show workflow information
        run: |
          export _NAME=$(jq ".[\"$GOOS-$GOARCH$GOARM$GOMIPS\"].friendlyName" -r < .github/build/friendly-filenames.json)
          echo "GOOS: $GOOS, GOARCH: $GOARCH, GOARM: $GOARM, GOMIPS: $GOMIPS, RELEASE_NAME: $_NAME"
          echo "ASSET_NAME=$_NAME" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Vet
        run: go vet ./...

      - name: Build on Linux
        if: matrix.goos == 'linux'
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p build_assets
          go build -v -o build_assets/tgbot-upnp -trimpath -ldflags "-s -w" ./cmd/

      - name: Build on Windows
        if: matrix.goos == 'windows'
        env:
          CGO_ENABLED: 0
        run: |
          GOOS=linux GOARCH=amd64 go install github.com/tc-hib/go-winres@latest
          pushd systray || exit 1
          go-winres make --arch ${{ matrix.goarch }} --product-version=${{ github.ref }} --file-version=$(date +"%Y.%m.%d.%H")
          go build -v -o ../build_assets/tgbot-upnp.exe -trimpath -ldflags "-s -w -H=windowsgui" ./
          popd || exit 1

      - name: Run UPX
        if: matrix.goos != 'windows'
        uses: crazy-max/ghaction-upx@v4
        with:
          version: latest
          files: ./build_assets/*
          args: -fq

      - name: Create ZIP archive
        shell: bash
        run: |
          cp ${GITHUB_WORKSPACE}/README.md ./build_assets/README.md
          pushd build_assets || exit 1
          touch -mt $(date +%Y01010000) *
          zip -9vr ../tgbot-upnp-${{ env.ASSET_NAME }}.zip .
          popd || exit 1

      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: tgbot-upnp-${{ env.ASSET_NAME }}
          path: ./tgbot-upnp-${{ env.ASSET_NAME }}.zip

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./tgbot-upnp-${{ env.ASSET_NAME }}.zip
          tag: ${{ github.ref_name }}
